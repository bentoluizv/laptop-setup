---
- name: Install apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"
  become: true

- name: Register Docker's apt repository
  ansible.builtin.include_role:
    name: apt-packages
    tasks_from: external_repos.yml
  vars:
    external_repos: "{{ docker_external_repos }}"

- name: Install Docker Engine and the compose plugin
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
  become: true

- name: Configure the Docker daemon
  ansible.builtin.copy:
    content: "{{ docker_daemon_options | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    mode: "0644"
  become: true
  when: docker_daemon_options | length > 0
  notify: Restart docker

- name: Ensure Docker is running and enabled at boot
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true
  when: not docker_rootless | bool

- name: Set up rootless Docker
  when: docker_rootless | bool
  block:
    - name: Install the rootless extras
      ansible.builtin.apt:
        name: docker-ce-rootless-extras
        state: present
      become: true

    - name: Stop the system-wide docker daemon
      ansible.builtin.systemd:
        name: docker
        state: stopped
        enabled: false
      become: true

    - name: Check whether the rootless daemon is already configured
      ansible.builtin.stat:
        path: "{{ target_home }}/.config/systemd/user/docker.service"
      register: rootless_unit

    - name: Run the rootless setup tool
      ansible.builtin.command: /usr/bin/dockerd-rootless-setuptool.sh install
      become: false
      when: not rootless_unit.stat.exists
      changed_when: true

    - name: Point the client at the rootless socket
      ansible.builtin.blockinfile:
        path: "{{ target_home }}/.profile"
        create: true
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED: docker-rootless"
        block: |
          export DOCKER_HOST="unix:///run/user/$(id -u)/docker.sock"
      become: false

- name: "Add the target account to the docker group: {{ target_user }}"
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: docker
    append: true
  become: true
  when:
    - docker_add_user_to_group | bool
    - not docker_rootless | bool
  register: docker_group_result

- name: Flag that a re-login is needed
  ansible.builtin.set_fact:
    docker_group_changed: "{{ docker_group_result.changed | default(false) }}"
