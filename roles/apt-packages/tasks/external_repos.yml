---
- name: Create the apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Fetch third-party signing keys
  ansible.builtin.get_url:
    url: "{{ item.key_url }}"
    dest: "/etc/apt/keyrings/{{ item.name }}.{{ 'asc' if item.key_armored | default(true) else 'gpg' }}"
    mode: "0644"
    force: true
  become: true
  loop: "{{ external_repos }}"
  loop_control:
    label: "{{ item.name }}"

- name: Read the fingerprint of each fetched signing key
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      gpg --show-keys --with-colons
      "/etc/apt/keyrings/{{ item.name }}.{{ 'asc' if item.key_armored | default(true) else 'gpg' }}"
      | awk -F: '/^fpr:/ {print $10; exit}'
    executable: /bin/bash
  loop: "{{ external_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: key_fingerprints
  changed_when: false

- name: Verify each signing key matches its pinned fingerprint
  ansible.builtin.assert:
    that: (item.stdout | trim) == item.item.key_fingerprint
    fail_msg: >-
      The signing key served for {{ item.item.name }} does not match the
      fingerprint pinned in this repository.
      Expected {{ item.item.key_fingerprint }},
      got {{ item.stdout | trim | default('nothing') }}.
      Refusing to register the repository.
    success_msg: "{{ item.item.name }} key matches its pinned fingerprint"
  loop: "{{ key_fingerprints.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.item.key_fingerprint is defined

- name: Preseed debconf answers for vendor packages
  ansible.builtin.debconf:
    name: "{{ item.debconf.name }}"
    question: "{{ item.debconf.question }}"
    vtype: "{{ item.debconf.vtype | default('boolean') }}"
    value: "{{ item.debconf.value }}"
  become: true
  loop: "{{ external_repos | selectattr('debconf', 'defined') | list }}"
  loop_control:
    label: "{{ item.debconf.question }}"

- name: Check whether a vendor now manages its own source file
  ansible.builtin.stat:
    path: "{{ item.self_managed_marker | default('/nonexistent') }}"
  loop: "{{ external_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: vendor_managed

- name: Add third-party repositories
  ansible.builtin.apt_repository:
    repo: "{{ item.item.repo }}"
    filename: "{{ item.item.name }}"
    state: present
    update_cache: false
  become: true
  loop: "{{ vendor_managed.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not item.stat.exists
  register: repos_added

- name: Drop our bootstrap source file once the vendor manages its own
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/{{ item.item.name }}.list"
    state: absent
  become: true
  loop: "{{ vendor_managed.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.stat.exists
  register: bootstrap_dropped

- name: Refresh the apt cache after repository changes
  ansible.builtin.apt:
    update_cache: true
  become: true
  when: repos_added.changed or bootstrap_dropped.changed
  changed_when: false
