---
- name: Install prerequisites for managing apt repositories
  ansible.builtin.apt:
    name:
      - software-properties-common
      - gnupg
      - apt-transport-https
      - ca-certificates
      - debconf-utils
    state: present
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"
  become: true
  when: (apt_ppas | length > 0) or (apt_external_repos | length > 0)

- name: Add PPAs
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
    state: present
    update_cache: false
  become: true
  loop: "{{ apt_ppas }}"
  register: ppas_added

- name: Set up third-party apt repositories
  ansible.builtin.include_tasks: external_repos.yml
  vars:
    external_repos: "{{ apt_external_repos }}"
  when: apt_external_repos | length > 0

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: >-
      {{ 0 if (ppas_added.changed | default(false)) else apt_cache_valid_time }}
  become: true
  changed_when: false

- name: Install base apt packages
  ansible.builtin.apt:
    name: "{{ apt_packages }}"
    state: present
  become: true
  when: apt_packages | length > 0

- name: Link fdfind to fd
  become: false
  when:
    - apt_link_fd | bool
    - "'fd-find' in apt_packages"
  block:
    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "{{ target_home }}/.local/bin"
        state: directory
        mode: "0755"

    - name: Check what currently occupies ~/.local/bin/fd
      ansible.builtin.stat:
        path: "{{ target_home }}/.local/bin/fd"
      register: fd_path

    - name: Create the fd symlink
      ansible.builtin.file:
        src: /usr/bin/fdfind
        dest: "{{ target_home }}/.local/bin/fd"
        state: link
        force: true
      when: not fd_path.stat.exists or fd_path.stat.islnk

    - name: Report an unmanaged fd binary
      ansible.builtin.debug:
        msg: >-
          {{ target_home }}/.local/bin/fd is a real file, not a symlink, so it
          was left alone. Remove it, or set apt_link_fd: false to stop trying.
      when: fd_path.stat.exists and not fd_path.stat.islnk

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
  become: true
  when: apt_perform_upgrade | bool

- name: Remove packages left behind by removed dependencies
  ansible.builtin.apt:
    autoremove: true
  become: true
  when: apt_perform_upgrade | bool
