---
# Overridden by group_vars/all.yml. Present so the role stands alone.
apt_packages: []
apt_ppas: []
apt_external_repos: []
# Input to external_repos.yml. Callers override it via `vars:` at the include
# site; the empty default keeps the task file safe to include on its own.
external_repos: []
apt_cache_valid_time: 3600
apt_perform_upgrade: false
apt_link_fd: true

target_user: "{{ ansible_facts['user_id'] }}"
target_home: "/home/{{ target_user }}"
