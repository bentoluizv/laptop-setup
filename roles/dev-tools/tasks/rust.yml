---
- name: Check whether rustup is installed
  ansible.builtin.stat:
    path: "{{ cargo_home }}/bin/rustup"
  register: rustup_bin

- name: Fetch the published rustup-init checksum
  ansible.builtin.uri:
    url: "{{ rustup_dist_url }}/{{ rustup_target }}/rustup-init.sha256"
    return_content: true
  register: rustup_init_sha
  when: not rustup_bin.stat.exists
  changed_when: false

- name: Fetch rustup-init
  ansible.builtin.get_url:
    url: "{{ rustup_dist_url }}/{{ rustup_target }}/rustup-init"
    dest: /tmp/rustup-init
    checksum: "sha256:{{ rustup_init_sha.content.split()[0] }}"
    mode: "0755"
  when: not rustup_bin.stat.exists

- name: Install rustup
  ansible.builtin.command: >-
    /tmp/rustup-init -y --no-modify-path
    --default-toolchain {{ dev_tools_languages.rust.channel }}
  environment:
    CARGO_HOME: "{{ cargo_home }}"
    RUSTUP_HOME: "{{ rustup_home }}"
  when: not rustup_bin.stat.exists
  become: false
  changed_when: true

- name: Remove rustup-init
  ansible.builtin.file:
    path: /tmp/rustup-init
    state: absent

- name: Check the active toolchain
  ansible.builtin.command: "{{ cargo_home }}/bin/rustup show active-toolchain"
  environment:
    CARGO_HOME: "{{ cargo_home }}"
    RUSTUP_HOME: "{{ rustup_home }}"
  register: rust_toolchain
  changed_when: false
  become: false

- name: Set the default toolchain to {{ dev_tools_languages.rust.channel }}
  ansible.builtin.command: "{{ cargo_home }}/bin/rustup default {{ dev_tools_languages.rust.channel }}"
  environment:
    CARGO_HOME: "{{ cargo_home }}"
    RUSTUP_HOME: "{{ rustup_home }}"
  when: dev_tools_languages.rust.channel not in rust_toolchain.stdout
  become: false
  changed_when: true

- name: Update the Rust toolchain
  ansible.builtin.command: "{{ cargo_home }}/bin/rustup update {{ dev_tools_languages.rust.channel }}"
  environment:
    CARGO_HOME: "{{ cargo_home }}"
    RUSTUP_HOME: "{{ rustup_home }}"
  register: rustup_updated
  changed_when: "'unchanged' not in rustup_updated.stdout"
  when: rust_update | bool
  become: false

- name: Add cargo to the shell environment
  ansible.builtin.blockinfile:
    path: "{{ shell_env_file }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED: rust"
    block: |
      export CARGO_HOME="{{ cargo_home }}"
      export RUSTUP_HOME="{{ rustup_home }}"
      _laptop_setup_path_prepend "$CARGO_HOME/bin"
  become: false
