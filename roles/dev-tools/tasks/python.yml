---
- name: Check whether uv is installed
  ansible.builtin.stat:
    path: "{{ uv_bin_dir }}/uv"
  register: uv_bin

- name: Install uv
  ansible.builtin.shell:
    cmd: "curl -LsSf https://astral.sh/uv/install.sh | sh"
  environment:
    UV_NO_MODIFY_PATH: "1"
    UV_INSTALL_DIR: "{{ uv_bin_dir }}"
  when: not uv_bin.stat.exists
  become: false

- name: Update uv in place
  ansible.builtin.command: "{{ uv_bin_dir }}/uv self update"
  register: uv_update
  changed_when: "'Upgraded uv' in uv_update.stdout"
  when: uv_self_update | bool
  become: false

- name: Check which Python versions uv already has
  ansible.builtin.command: "{{ uv_bin_dir }}/uv python list --only-installed"
  register: uv_python_installed
  changed_when: false
  when: dev_tools_languages.python.versions | length > 0
  become: false

- name: Preinstall Python versions
  ansible.builtin.command: "{{ uv_bin_dir }}/uv python install {{ item }}"
  loop: "{{ dev_tools_languages.python.versions }}"
  when: "'cpython-' ~ item not in (uv_python_installed.stdout | default(''))"
  become: false

- name: Install python/python3 executables for {{ dev_tools_languages.python.default }}
  ansible.builtin.command: >-
    {{ uv_bin_dir }}/uv python install
    {{ dev_tools_languages.python.default }} --default
  when: dev_tools_languages.python.default | length > 0
  changed_when: false
  become: false

- name: Add uv to the shell environment
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.profile"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED: uv"
    block: |
      export PATH="{{ uv_bin_dir }}:$PATH"
  become: false
