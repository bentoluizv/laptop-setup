---
- name: Install base development packages
  ansible.builtin.apt:
    name: "{{ dev_tools_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"
  become: true

- name: Create the directory holding the shared shell environment
  ansible.builtin.file:
    path: "{{ shell_env_file | dirname }}"
    state: directory
    mode: "0755"
  become: false

- name: Write the path helper the language blocks build on
  ansible.builtin.blockinfile:
    path: "{{ shell_env_file }}"
    create: true
    mode: "0644"
    insertbefore: BOF
    marker: "# {mark} ANSIBLE MANAGED: helper"
    block: |
      # Prepend to PATH only when absent, so sourcing this file more than once
      # cannot duplicate entries.
      _laptop_setup_path_prepend() {
          case ":$PATH:" in
              *":$1:"*) ;;
              *) PATH="$1:$PATH" ;;
          esac
      }
  become: false

- name: Set up Python via uv
  ansible.builtin.include_tasks: python.yml
  when: dev_tools_languages.python.enabled | default(false) | bool
  tags: [python]

- name: Set up Node via nvm
  ansible.builtin.include_tasks: node.yml
  when: dev_tools_languages.node.enabled | default(false) | bool
  tags: [node]

- name: Set up Go
  ansible.builtin.include_tasks: go.yml
  when: dev_tools_languages.go.enabled | default(false) | bool
  tags: [go]

- name: Set up Rust via rustup
  ansible.builtin.include_tasks: rust.yml
  when: dev_tools_languages.rust.enabled | default(false) | bool
  tags: [rust]

- name: Expose the tools to the whole user session
  when: session_env_enabled | bool
  become: false
  vars:
    session_path_entries: >-
      {{ ([uv_bin_dir] if dev_tools_languages.python.enabled | bool else [])
         + ([nvm_dir ~ '/versions/node/' ~ node_target ~ '/bin']
            if (dev_tools_languages.node.enabled | bool and node_target is defined) else [])
         + ([go_install_dir ~ '/go/bin', target_home ~ '/go/bin']
            if dev_tools_languages.go.enabled | bool else [])
         + ([cargo_home ~ '/bin'] if dev_tools_languages.rust.enabled | bool else []) }}
  block:
    - name: Create the systemd user environment directory
      ansible.builtin.file:
        path: "{{ session_env_file | dirname }}"
        state: directory
        mode: "0755"

    - name: Write the session PATH
      ansible.builtin.copy:
        dest: "{{ session_env_file }}"
        mode: "0644"
        content: |
          PATH={{ session_path_entries | join(':') }}:${PATH}

- name: Find which shell rc files exist
  ansible.builtin.stat:
    path: "{{ target_home }}/{{ item }}"
  loop: "{{ shell_rc_files }}"
  register: shell_rc_stat
  become: false

- name: Source the shared environment from every shell rc file present
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/{{ item.item }}"
    marker: "# {mark} ANSIBLE MANAGED: laptop-setup"
    block: |
      [ -f "{{ shell_env_file }}" ] && . "{{ shell_env_file }}"
  loop: "{{ shell_rc_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists
  become: false

- name: Remove per-tool blocks written by earlier versions
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/{{ item.0 }}"
    marker: "# {mark} ANSIBLE MANAGED: {{ item.1 }}"
    state: absent
  loop: "{{ present_rc | product(['uv', 'nvm', 'go', 'rust']) | list }}"
  loop_control:
    label: "{{ item.0 }} / {{ item.1 }}"
  vars:
    present_rc: "{{ shell_rc_stat.results | selectattr('stat.exists') | map(attribute='item') | list }}"
  become: false
