---
- name: Install base development packages
  ansible.builtin.apt:
    name: "{{ dev_tools_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"
  become: true

- name: Look for a legacy .profile
  ansible.builtin.stat:
    path: "{{ target_home }}/.profile"
  register: legacy_profile
  become: false

- name: Remove shell blocks left in .profile by earlier runs
  ansible.builtin.blockinfile:
    path: "{{ target_home }}/.profile"
    marker: "# {mark} ANSIBLE MANAGED: {{ item }}"
    state: absent
  loop: [uv, nvm, go, rust]
  become: false
  when:
    - legacy_profile.stat.exists
    - shell_rc_file != target_home ~ '/.profile'

- name: Set up Python via uv
  ansible.builtin.include_tasks: python.yml
  when: dev_tools_languages.python.enabled | default(false) | bool
  tags: [python]

- name: Set up Node via nvm
  ansible.builtin.include_tasks: node.yml
  when: dev_tools_languages.node.enabled | default(false) | bool
  tags: [node]

- name: Set up Go
  ansible.builtin.include_tasks: go.yml
  when: dev_tools_languages.go.enabled | default(false) | bool
  tags: [go]

- name: Set up Rust via rustup
  ansible.builtin.include_tasks: rust.yml
  when: dev_tools_languages.rust.enabled | default(false) | bool
  tags: [rust]
