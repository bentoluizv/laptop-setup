---
- name: Check whether nvm is installed
  ansible.builtin.stat:
    path: "{{ nvm_dir }}/nvm.sh"
  register: nvm_script

- name: Ensure the nvm directory exists
  ansible.builtin.file:
    path: "{{ nvm_dir }}"
    state: directory
    mode: "0755"
  when: not nvm_script.stat.exists
  become: false

- name: Fetch the pinned nvm installer
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh"
    dest: /tmp/nvm-installer.sh
    checksum: "sha256:{{ nvm_installer_sha256 }}"
    mode: "0755"
  when: not nvm_script.stat.exists

- name: Install nvm
  ansible.builtin.command: /bin/bash /tmp/nvm-installer.sh
  environment:
    NVM_DIR: "{{ nvm_dir }}"
    PROFILE: /dev/null
  when: not nvm_script.stat.exists
  become: false
  changed_when: true

- name: Add nvm to the shell environment
  ansible.builtin.blockinfile:
    path: "{{ shell_env_file }}"
    create: true
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED: nvm"
    block: |
      export NVM_DIR="{{ nvm_dir }}"
      [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && . "$NVM_DIR/bash_completion"
  become: false

- name: Remove the nvm installer
  ansible.builtin.file:
    path: /tmp/nvm-installer.sh
    state: absent

- name: Look up the current LTS Node release
  ansible.builtin.shell:
    cmd: '. "{{ nvm_dir }}/nvm.sh" && nvm version-remote --lts'
    executable: /bin/bash
  register: nvm_lts_remote
  changed_when: false
  when: dev_tools_languages.node.version | string == 'lts'
  become: false

- name: Record the target Node version
  ansible.builtin.set_fact:
    node_target: >-
      {{ (nvm_lts_remote.stdout | trim)
         if dev_tools_languages.node.version | string == 'lts'
         else 'v' ~ dev_tools_languages.node.version }}
    node_install_spec: >-
      {{ '--lts' if dev_tools_languages.node.version | string == 'lts'
         else dev_tools_languages.node.version }}
    node_default_alias: >-
      {{ 'lts/*' if dev_tools_languages.node.version | string == 'lts'
         else dev_tools_languages.node.version }}

- name: Check which Node versions are installed
  ansible.builtin.shell:
    cmd: '. "{{ nvm_dir }}/nvm.sh" && nvm ls --no-colors --no-alias'
    executable: /bin/bash
  register: nvm_ls
  changed_when: false
  failed_when: false
  become: false

- name: Install Node {{ node_target }}
  ansible.builtin.shell:
    cmd: >-
      . "{{ nvm_dir }}/nvm.sh" &&
      nvm install {{ node_install_spec }} &&
      nvm alias default '{{ node_default_alias }}'
    executable: /bin/bash
  when: >-
    not (nvm_ls.stdout is search('(?m)' ~ (node_target | regex_escape) ~ '(\.|\s|$)'))
  become: false
  changed_when: true

- name: List globally installed npm packages
  ansible.builtin.shell:
    cmd: '. "{{ nvm_dir }}/nvm.sh" && npm ls -g --depth=0 --parseable'
    executable: /bin/bash
  register: npm_global_installed
  changed_when: false
  failed_when: false
  when: npm_global_packages | length > 0
  become: false

- name: Install global npm packages
  ansible.builtin.shell:
    cmd: '. "{{ nvm_dir }}/nvm.sh" && npm install -g {{ item }}'
    executable: /bin/bash
  loop: "{{ npm_global_packages }}"
  when: >-
    not ((npm_global_installed.stdout | default('')) is search(
      '(?m)/' ~ (item | regex_replace('(?<!^)@[^@]*$', '') | regex_escape) ~ '$'))
  become: false
  changed_when: true
