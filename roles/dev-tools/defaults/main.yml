---
dev_tools_base_packages:
  - build-essential
  - git
  - curl
  - ca-certificates

dev_tools_languages:
  python:
    enabled: false
    versions: []
    default: ""
  node: {enabled: false, version: "lts"}
  go: {enabled: false, version: "latest"}
  rust: {enabled: false, channel: "stable"}

npm_global_packages: []

target_user: "{{ ansible_facts['user_id'] }}"
target_home: "/home/{{ target_user }}"
deb_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}"
apt_cache_valid_time: 3600

uv_bin_dir: "{{ target_home }}/.local/bin"
uv_self_update: false
nvm_dir: "{{ target_home }}/.nvm"
nvm_version: "v0.40.1"
uv_version: "0.11.29"
uv_installer_sha256: "504a79fd2ed0dcd47e7f04f0792cfd0871f62e24a7fe40fa8ae0f563a369f2bd"
nvm_installer_sha256: "abdb525ee9f5b48b34d8ed9fc67c6013fb0f659712e401ecd88ab989b3af8f53"
rustup_dist_url: "https://static.rust-lang.org/rustup/dist"
rustup_target: "{{ 'x86_64-unknown-linux-gnu' if ansible_facts['architecture'] == 'x86_64' else 'aarch64-unknown-linux-gnu' }}"
go_install_dir: "/usr/local"
cargo_home: "{{ target_home }}/.cargo"
rustup_home: "{{ target_home }}/.rustup"
rust_update: false
