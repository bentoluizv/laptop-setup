[defaults]
inventory = inventory.ini
roles_path = roles
collections_path = collections
host_key_checking = False
interpreter_python = auto_silent
# Readable multi-line output. The old `stdout_callback = yaml` came from
# community.general and was removed in that collection's 12.0.0; this is the
# ansible-core replacement (2.13+).
stdout_callback = default
result_format = yaml
# Cache fact gathering so repeat runs are quicker.
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_facts
fact_caching_timeout = 3600

[privilege_escalation]
become = False
become_method = sudo
