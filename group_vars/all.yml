---
target_user: "{{ ansible_facts['user_id'] }}"
target_home: "/home/{{ target_user }}"
classic_sudo_path: /usr/bin/sudo.ws

apt_cache_valid_time: 3600
apt_perform_upgrade: false
apt_link_fd: true
apt_ppas: []

apt_packages:
  - git
  - curl
  - wget
  - ripgrep
  - fd-find
  - fzf
  - tree
  - htop
  - jq
  - unzip
  - vim
  - tmux
  - google-chrome-stable
  - gh
  - code
  - ddev
  - mkcert

deb_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}"

apt_external_repos:
  - name: google-chrome
    key_url: https://dl.google.com/linux/linux_signing_key.pub
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.asc]
      https://dl.google.com/linux/chrome/deb/ stable main
    self_managed_marker: /etc/apt/sources.list.d/google-chrome.sources

  - name: github-cli
    key_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    key_armored: false
    repo: >-
      deb [arch={{ deb_arch }} signed-by=/etc/apt/keyrings/github-cli.gpg]
      https://cli.github.com/packages stable main

  - name: ddev
    key_url: https://pkg.ddev.com/apt/gpg.key
    repo: >-
      deb [signed-by=/etc/apt/keyrings/ddev.asc]
      https://pkg.ddev.com/apt/ * *

  - name: vscode
    key_url: https://packages.microsoft.com/keys/microsoft.asc
    repo: >-
      deb [arch={{ deb_arch }} signed-by=/etc/apt/keyrings/vscode.asc]
      https://packages.microsoft.com/repos/code stable main
    debconf:
      name: code
      question: code/add-microsoft-repo
      vtype: boolean
      value: "false"

dev_tools_base_packages:
  - build-essential
  - git
  - curl
  - ca-certificates

dev_tools_languages:
  python:
    enabled: true
    versions: []
    default: ""
  node:
    enabled: true
    version: "lts"
  go:
    enabled: true
    version: "latest"
  rust:
    enabled: true
    channel: "stable"

npm_global_packages:
  - "@fission-ai/openspec@latest"

uv_bin_dir: "{{ target_home }}/.local/bin"
uv_self_update: false
nvm_dir: "{{ target_home }}/.nvm"
nvm_version: "v0.40.1"
go_install_dir: "/usr/local"
cargo_home: "{{ target_home }}/.cargo"
rustup_home: "{{ target_home }}/.rustup"
rust_update: false

docker_enabled: true
docker_apt_codename: "{{ ansible_facts['distribution_release'] }}"
docker_add_user_to_group: true
docker_daemon_options: {}
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

dotfiles_enabled: false
dotfiles_repo: ""
dotfiles_version: "main"
dotfiles_dest: "{{ target_home }}/.dotfiles"
dotfiles_install_script: ""
dotfiles_links: []
dotfiles_backup_existing: true

snap_packages:
  - name: aws-cli
    classic: true
    channel: v2/stable

flatpak_enabled: false
flatpak_remote_name: flathub
flatpak_remote_url: https://dl.flathub.org/repo/flathub.flatpakrepo
flatpak_packages: []
