---
- name: Prepare the container to look like a fresh laptop
  hosts: all
  gather_facts: false
  become: true
  vars:
    ansible_user: root

  tasks:
    - name: Install python and sudo so Ansible can work here
      ansible.builtin.raw: |
        apt-get update -qq
        apt-get install -y -qq python3 sudo ca-certificates
      changed_when: true

    - name: Gather facts now that python exists
      ansible.builtin.setup:

    - name: Create the unprivileged account the playbook configures
      ansible.builtin.user:
        name: laptop
        shell: /bin/bash
        create_home: true

    - name: Grant it passwordless sudo
      ansible.builtin.copy:
        content: "laptop ALL=(ALL) NOPASSWD:ALL\n"
        dest: /etc/sudoers.d/laptop
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s
